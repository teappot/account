{% extends "account/auth.html" %}
{% load i18n %}

{% block content %}
<div class="col-12" style="padding-top: 8vh;">
    <div class="mx-auto col-12" style="max-width: 768px;">
        <div class="card p-1 p-md-4">
            <div class="card-body">
                <div class="card-title">
                    <h1>{% trans "Registrar Cuenta" %}</h1>
                </div>
                <hr />
                <div class="col-12">
                    <form class="form-horizontal" method="post" action="." hx-boost="false">
                        
                        <input type="hidden" name="next" value="{{ NEXT }}" />
                        {% include "teacore/form.html" with form=form %}

                        <div class="row form-group">
                            <div class="col-12 mb-3 d-grid gap-2">
                                <button type="submit" class="btn btn-primary user-action">
                                    {% trans "Registrar Cuenta" %}
                                </button>
                            </div>
                            <div class="btn-group col-12 mb-3">
                                <button onclick="history.back()" class="btn btn-secondary user-action">
                                    <i class="fa fa-arrow-left"></i>
                                </button>
                                <a href="{% url 'account:login' %}" class="btn btn-outline-secondary user-action">
                                    {% trans "Iniciar Sesión" %}
                                </a>
                                {% if AUTH_SELF_RECOVERY %}
                                <a href="{% url 'account:recovery' %}{% if form.data.username|length > 0 %}?username={{ form.data.username }}{% endif %}" class="btn btn-outline-danger user-action">
                                    {% trans "Recuperar Acceso" %}
                                </a>
                                {% endif %}
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
